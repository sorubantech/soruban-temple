const MENU = [
  { id: 'dashboard', icon: 'fa-gauge-high', label: 'Platform Dashboard' },
  { id: 'temples', icon: 'fa-place-of-worship', label: 'Temple Management' },
  { id: 'admins', icon: 'fa-user-shield', label: 'Temple Admins' },
  { id: 'users', icon: 'fa-users', label: 'Devotees' },
  { id: 'providers', icon: 'fa-person-praying', label: 'Providers' },
  { id: 'bookings', icon: 'fa-calendar-check', label: 'All Bookings' },
  { id: 'finance', icon: 'fa-chart-line', label: 'Finance & Revenue' },
  { id: 'content', icon: 'fa-newspaper', label: 'Content Moderation' },
  { id: 'support', icon: 'fa-headset', label: 'Support Tickets' },
  { id: 'notifications', icon: 'fa-bell', label: 'Notifications' },
  { id: 'reports', icon: 'fa-file-chart-line', label: 'Reports' },
  { id: 'settings', icon: 'fa-gear', label: 'Platform Settings' },
];

let currentView = 'dashboard';

function init() {
  renderSidebar();
  showView('dashboard');
  const saved = localStorage.getItem('st_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}

function renderSidebar() {
  document.getElementById('sidebar-nav').innerHTML = MENU.map(m => `
    <div class="nav-menu-item ${m.id===currentView?'active':''}" onclick="showView('${m.id}')">
      <i class="fa-solid ${m.icon}"></i> ${m.label}
    </div>
  `).join('');
}

function showView(id) {
  currentView = id;
  renderSidebar();
  document.getElementById('page-title').textContent = MENU.find(m=>m.id===id)?.label||'Dashboard';
  const el = document.getElementById('admin-content');
  el.innerHTML = views[id] ? views[id]() : placeholder(MENU.find(m=>m.id===id)?.label||id);
  el.scrollTop = 0;
  if (id === 'dashboard') setTimeout(initSACharts, 100);
  document.getElementById('sidebar').classList.remove('open');
}

function toggleTheme() {
  const c = document.documentElement.getAttribute('data-theme');
  const n = c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('st_theme', n);
  document.getElementById('theme-icon').className = n==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';
}

function placeholder(title) {
  return `<div class="empty-state" style="padding:80px"><i class="fa-solid fa-wrench" style="font-size:3rem;color:var(--text-muted)"></i><h3>${title}</h3><p>Full module with CRUD operations coming soon.</p></div>`;
}

function initSACharts() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const textColor = isDark ? '#BCAAA4' : '#8D6E63';
  const gridColor = isDark ? '#3E2723' : '#EFEBE9';

  const ctx = document.getElementById('growthChart');
  if (ctx) {
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar'],
        datasets: [
          { label: 'Temples', data: [80, 95, 105, 118, 130, 142], backgroundColor: '#E65100', borderRadius: 6 },
          { label: 'Users (÷100)', data: [45, 58, 72, 88, 105, 124], backgroundColor: '#FFB300', borderRadius: 6 },
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: textColor } } },
        scales: {
          x: { ticks: { color: textColor }, grid: { color: gridColor } },
          y: { ticks: { color: textColor }, grid: { color: gridColor } }
        }
      }
    });
  }
}
