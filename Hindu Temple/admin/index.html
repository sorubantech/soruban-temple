<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Digital - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <div class="logo-circle"><i class="fas fa-place-of-worship"></i></div>
            </div>

            <h1 class="login-title">Temple Digital</h1>
            <p class="login-subtitle">Admin Panel</p>

            <form id="login-form" onsubmit="adminApp.adminLogin(event)">
                <div class="form-group">
                    <input
                        type="text"
                        id="adminUsername"
                        placeholder="Username"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <input
                        type="password"
                        id="adminPassword"
                        placeholder="Password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="login-btn">Sign In</button>

                <p class="credentials-hint">Super Admin: admin / admin123</p>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="js/admin.js"></script>
</body>
</html>
