<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Management - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ---------- Temples Page Specific Styles ---------- */
        .action-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding: 16px 20px;
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
        }
        .action-bar .btn-add-temple {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
            white-space: nowrap;
        }
        .action-bar .btn-add-temple:hover {
            background: var(--primary-dark);
        }
        .action-bar .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .action-bar .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition);
        }
        .action-bar .search-box input:focus {
            border-color: var(--primary);
        }
        .action-bar .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }
        .action-bar .filter-select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            background: #fff;
            cursor: pointer;
            min-width: 140px;
        }
        .action-bar .filter-select:focus {
            border-color: var(--primary);
        }

        /* Temple Grid */
        .temples-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Temple Card */
        .temple-card {
            background: var(--card-bg);
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            transition: box-shadow var(--transition), transform var(--transition);
        }
        .temple-card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }
        .temple-card-image {
            height: 180px;
            background: linear-gradient(135deg, #f0e6d3 0%, #fce4b8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .temple-card-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .temple-card-image .temple-emoji {
            font-size: 56px;
        }
        .temple-card-image .deity-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .deity-badge.shiva { background: #5c6bc0; }
        .deity-badge.vishnu { background: #1e88e5; }
        .deity-badge.devi { background: #e91e63; }
        .deity-badge.ganesh { background: #ff7043; }
        .deity-badge.murugan { background: #26a69a; }
        .deity-badge.other { background: #78909c; }

        .temple-card-body {
            padding: 16px 20px 20px;
        }
        .temple-card-body h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .temple-card-body .temple-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .temple-card-body .temple-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .temple-card-body .temple-rating .star {
            color: #f9a825;
            font-size: 14px;
        }
        .temple-card-body .temple-rating .star.empty {
            color: #ddd;
        }
        .temple-card-body .temple-rating .rating-num {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 4px;
        }
        .temple-card-body .temple-timings {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .temple-card-actions {
            display: flex;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        .temple-card-actions .btn {
            flex: 1;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition), opacity var(--transition);
            text-align: center;
        }
        .temple-card-actions .btn-edit {
            background: var(--info-bg);
            color: var(--info);
        }
        .temple-card-actions .btn-edit:hover {
            background: #bbdefb;
        }
        .temple-card-actions .btn-delete {
            background: var(--danger-bg);
            color: var(--danger);
        }
        .temple-card-actions .btn-delete:hover {
            background: #ffcdd2;
        }

        /* Temple Modal Form */
        .temple-form .form-group {
            margin-bottom: 16px;
        }
        .temple-form .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }
        .temple-form .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition);
            font-family: var(--font-family);
        }
        .temple-form .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(230, 81, 0, 0.1);
        }
        .temple-form textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }
        .temple-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .temple-form .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .temple-form .btn-save {
            padding: 10px 28px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }
        .temple-form .btn-save:hover {
            background: var(--primary-dark);
        }
        .temple-form .btn-cancel {
            padding: 10px 28px;
            background: #f5f5f5;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }
        .temple-form .btn-cancel:hover {
            background: #e0e0e0;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .temples-grid {
                grid-template-columns: 1fr;
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-bar .search-box {
                min-width: auto;
            }
            .temple-form .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // =====================================================================
        // Temple Page Logic
        // =====================================================================

        /**
         * Render temple cards into the grid.
         * Reads from localStorage via adminApp and renders card-based UI.
         */
        function renderTempleCards() {
            var container = document.getElementById('temples-grid');
            if (!container) return;

            var temples = JSON.parse(localStorage.getItem('admin_temples') || '[]');
            if (!Array.isArray(temples) || temples.length === 0) {
                container.innerHTML =
                    '<div class="empty-state" style="grid-column: 1/-1;">' +
                    '<div class="empty-icon"><i class="fas fa-place-of-worship"></i></div>' +
                    '<h3>No Temples Found</h3>' +
                    '<p>Click "Add New Temple" to create your first temple.</p>' +
                    '</div>';
                return;
            }

            var searchTerm = (document.getElementById('temple-search').value || '').toLowerCase();
            var deityFilter = (document.getElementById('deity-filter').value || 'all').toLowerCase();

            var filtered = temples.filter(function(t) {
                var matchSearch = !searchTerm ||
                    (t.name || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                    (t.location || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                    (t.deity || '').toLowerCase().indexOf(searchTerm) !== -1;
                var matchDeity = deityFilter === 'all' || (t.deity || '').toLowerCase() === deityFilter;
                return matchSearch && matchDeity;
            });

            if (filtered.length === 0) {
                container.innerHTML =
                    '<div class="empty-state" style="grid-column: 1/-1;">' +
                    '<div class="empty-icon"><i class="fas fa-search"></i></div>' +
                    '<h3>No Matching Temples</h3>' +
                    '<p>Try adjusting your search or filter criteria.</p>' +
                    '</div>';
                return;
            }

            var html = '';
            filtered.forEach(function(t) {
                var deityClass = getDeityClass(t.deity);
                var timingsText = t.timings || buildTimings(t.morningTimings, t.eveningTimings) || 'Not specified';
                var rating = parseFloat(t.rating) || 0;
                var starsHtml = renderStars(rating);

                var hasImage = t.image && t.image !== '' && t.image.indexOf('/') !== -1;
                var imageContent = hasImage
                    ? '<img src="' + escapeAttr(t.image) + '" alt="' + escapeAttr(t.name) + '">'
                    : '<span class="temple-emoji"><i class="fas fa-place-of-worship" style="font-size:3rem;color:#bf6c2c;"></i></span>';

                html +=
                    '<div class="temple-card" data-id="' + t.id + '" data-deity="' + escapeAttr(t.deity || '') + '">' +
                        '<div class="temple-card-image">' +
                            imageContent +
                            '<span class="deity-badge ' + deityClass + '">' + escapeHtml(t.deity || 'Other') + '</span>' +
                        '</div>' +
                        '<div class="temple-card-body">' +
                            '<h3>' + escapeHtml(t.name) + '</h3>' +
                            '<div class="temple-location">' +
                                '<span><i class="fas fa-location-dot"></i></span> ' + escapeHtml(t.location || 'Unknown') +
                            '</div>' +
                            '<div class="temple-rating">' +
                                starsHtml +
                                '<span class="rating-num">(' + rating.toFixed(1) + ')</span>' +
                            '</div>' +
                            '<div class="temple-timings">' +
                                '<span><i class="fas fa-clock"></i></span> ' + escapeHtml(timingsText) +
                            '</div>' +
                            '<div class="temple-card-actions">' +
                                '<button class="btn btn-edit" onclick="openEditTempleModal(\'' + t.id + '\');"><i class="fas fa-pen"></i> Edit</button>' +
                                '<button class="btn btn-delete" onclick="adminApp.deleteTemple(\'' + t.id + '\')"><i class="fas fa-trash"></i> Delete</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
            });

            container.innerHTML = html;
        }

        /**
         * Get the CSS class for a deity type badge.
         */
        function getDeityClass(deity) {
            if (!deity) return 'other';
            var d = deity.toLowerCase();
            if (d === 'shiva') return 'shiva';
            if (d === 'vishnu') return 'vishnu';
            if (d === 'devi' || d === 'amman' || d === 'parvati' || d === 'lakshmi') return 'devi';
            if (d === 'ganesh' || d === 'ganesha' || d === 'vinayagar') return 'ganesh';
            if (d === 'murugan' || d === 'karthikeya' || d === 'subramanya') return 'murugan';
            return 'other';
        }

        /**
         * Render star rating HTML.
         */
        function renderStars(rating) {
            var html = '';
            for (var i = 1; i <= 5; i++) {
                if (i <= Math.floor(rating)) {
                    html += '<span class="star">&#x2605;</span>';
                } else if (i - rating < 1 && i - rating > 0) {
                    html += '<span class="star">&#x2605;</span>';
                } else {
                    html += '<span class="star empty">&#x2606;</span>';
                }
            }
            return html;
        }

        /**
         * Build timings string from morning and evening values.
         */
        function buildTimings(morning, evening) {
            var parts = [];
            if (morning) parts.push(morning);
            if (evening) parts.push(evening);
            return parts.join(' | ');
        }

        /**
         * Escape HTML special characters.
         */
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        /**
         * Escape attribute value.
         */
        function escapeAttr(str) {
            return escapeHtml(str);
        }

        /**
         * Filter temple cards based on search and deity filter.
         */
        function filterTempleCards() {
            renderTempleCards();
        }

        /**
         * Open the Add Temple modal.
         */
        function openAddTempleModal() {
            document.getElementById('temple-modal-title').textContent = 'Add New Temple';
            document.getElementById('temple-form-submit-btn').textContent = 'Save Temple';
            document.getElementById('temple-form').reset();
            document.getElementById('temple-edit-id').value = '';
            document.getElementById('modal-temple-rating').value = '4.5';
            var modal = document.getElementById('temple-modal');
            modal.style.display = 'flex';
        }

        /**
         * Open the Edit Temple modal with pre-filled data.
         */
        function openEditTempleModal(id) {
            var temples = JSON.parse(localStorage.getItem('admin_temples') || '[]');
            var temple = temples.find(function(t) { return t.id === id; });
            if (!temple) {
                adminApp.showToast('Temple not found.', 'error');
                return;
            }

            document.getElementById('temple-modal-title').textContent = 'Edit Temple';
            document.getElementById('temple-form-submit-btn').textContent = 'Update Temple';
            document.getElementById('temple-edit-id').value = id;
            document.getElementById('modal-temple-name').value = temple.name || '';
            document.getElementById('modal-temple-deity').value = temple.deity || '';
            document.getElementById('modal-temple-location').value = temple.location || '';
            document.getElementById('modal-temple-description').value = temple.description || '';
            document.getElementById('modal-temple-rating').value = temple.rating || 4.5;

            // Parse timings
            var timings = temple.timings || '';
            if (timings.indexOf('|') !== -1) {
                var parts = timings.split('|');
                document.getElementById('modal-temple-morning').value = parts[0].trim();
                document.getElementById('modal-temple-evening').value = parts[1] ? parts[1].trim() : '';
            } else {
                document.getElementById('modal-temple-morning').value = timings;
                document.getElementById('modal-temple-evening').value = '';
            }

            var modal = document.getElementById('temple-modal');
            modal.style.display = 'flex';
        }

        /**
         * Close the temple modal.
         */
        function closeTempleModal() {
            document.getElementById('temple-modal').style.display = 'none';
        }

        /**
         * Handle temple form submit (add or edit).
         */
        function handleTempleFormSubmit(e) {
            e.preventDefault();
            var editId = document.getElementById('temple-edit-id').value;

            var morning = document.getElementById('modal-temple-morning').value.trim();
            var evening = document.getElementById('modal-temple-evening').value.trim();
            var timings = buildTimings(morning, evening);

            var data = {
                name: document.getElementById('modal-temple-name').value.trim(),
                deity: document.getElementById('modal-temple-deity').value,
                location: document.getElementById('modal-temple-location').value.trim(),
                description: document.getElementById('modal-temple-description').value.trim(),
                timings: timings,
                morningTimings: morning,
                eveningTimings: evening,
                rating: parseFloat(document.getElementById('modal-temple-rating').value) || 4.5
            };

            if (editId) {
                adminApp.editTemple(editId, data);
            } else {
                adminApp.addTemple(data);
            }

            closeTempleModal();
            renderTempleCards();
        }

        // Override the add-temple-btn click to use our custom modal
        document.getElementById('add-temple-btn').onclick = function() {
            openAddTempleModal();
        };

        // Close modal on overlay click
        document.getElementById('temple-modal').addEventListener('click', function(e) {
            if (e.target === this) closeTempleModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeTempleModal();
        });

        // =====================================================================
        // Initialize on page load
        // =====================================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            if (typeof adminApp !== 'undefined' && adminApp.checkAuth) {
                adminApp.checkAuth();
            }

            // Load temples into the grid
            adminApp.loadTemples();
            renderTempleCards();
        });
    </script>

</body>
</html>
